<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAH! — Connecting account…</title>
  <style>
    :root {
      --violet: #3D2A7A;
      --lime: #BAFF4A;
      --lime-dk: #4a8a00;
      --red: #C03030;
      --s2: #f0ede8;
      --bd: #e8e5de;
      --muted: #888888;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--s2);
      font-family: 'Gilroy', system-ui, sans-serif;
      color: var(--violet);
    }
    .card {
      background: white;
      border: 1px solid var(--bd);
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 460px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(61, 42, 122, 0.08);
    }
    h1 { margin: 16px 0 8px; font-weight: 800; font-size: 22px; }
    p  { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.5; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--bd);
      border-top-color: var(--lime-dk);
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ok-mark, .err-mark {
      width: 48px; height: 48px; border-radius: 50%; margin: 0 auto;
      display: grid; place-items: center;
      font-size: 24px; font-weight: 900; color: white;
    }
    .ok-mark  { background: var(--lime-dk); }
    .err-mark { background: var(--red); }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 22px;
      background: var(--violet);
      color: white;
      border: none;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h1>Connecting your account…</h1>
    <p id="msg">Exchanging tokens with the platform.</p>
  </div>

  <script>
    const SB_URL = 'https://piowmyefosrdpjisguii.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpb3dteWVmb3NyZHBqaXNndWlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDcyNjksImV4cCI6MjA5MDMyMzI2OX0.aI0-esJB5IH-KwgsHx_FM_YpOp9k-0M0gc5xlfdJrcY';

    function setState(kind, title, msg) {
      const card = document.getElementById('card');
      const icon = kind === 'ok' ? '<div class="ok-mark">✓</div>'
                 : kind === 'err' ? '<div class="err-mark">!</div>'
                 : '<div class="spinner"></div>';
      const button = kind !== 'loading'
        ? '<a class="btn" href="/YAH/">Back to YAH</a>'
        : '';
      card.innerHTML = icon + '<h1>' + title + '</h1><p>' + msg + '</p>' + button;
    }

    async function handle() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const error = params.get('error') || params.get('error_description');

      if (error) {
        setState('err', 'Authorization cancelled', error);
        return;
      }
      if (!code || !state) {
        setState('err', 'Missing code or state', 'The platform did not return the expected parameters.');
        return;
      }

      // Decode provider from state prefix: 'ig_' or 'tt_'
      let provider = '';
      if (state.startsWith('ig_')) provider = 'instagram';
      else if (state.startsWith('tt_')) provider = 'tiktok';
      else { setState('err', 'Unknown provider', 'State token did not identify the platform.'); return; }

      const fnUrl = SB_URL + '/functions/v1/' + provider + '-oauth-callback';

      try {
        const r = await fetch(fnUrl, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + SB_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ code, state })
        });
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || 'Callback failed');
        setState('ok',
          (provider === 'instagram' ? 'Instagram' : 'TikTok') + ' connected',
          'Account ' + (data.username ? '@' + data.username : '') + ' is now linked. You can close this window.');
      } catch (e) {
        setState('err', 'Connection failed', e.message);
      }
    }

    handle();
  </script>
</body>
</html>
