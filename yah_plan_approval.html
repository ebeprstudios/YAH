<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Your Content Plan — YAH!</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#f0ede8;color:#1a1a1a;min-height:100vh;-webkit-font-smoothing:antialiased}
.topbar{background:#3D2A7A;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:20px;font-weight:900;color:#BAFF4A;letter-spacing:-0.5px}
.brand span{font-size:11px;color:rgba(255,255,255,0.5);margin-left:8px;font-weight:400}
.shell{max-width:720px;margin:32px auto;padding:0 16px 60px}
.card{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-head{background:#0d0d0d;padding:14px 20px}
.card-eyebrow{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#6BBF00;margin-bottom:3px}
.card-title{font-size:15px;font-weight:700;color:#fff}
.card-body{padding:20px}
.greeting{font-size:14px;color:#333;line-height:1.7;margin-bottom:12px}
.planning-note{background:#f0f8e0;border-left:3px solid #6BBF00;padding:10px 14px;border-radius:0 6px 6px 0;font-size:12px;color:#4a8a00;font-weight:700;margin-bottom:0}
.week-label{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin:20px 0 8px;padding:0 2px}
.wl-1{color:#4a8a00}
.wl-2{color:#3D2A7A}
.day-row{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid #f0ede8}
.day-row:last-child{border-bottom:none}
.day-col{width:64px;flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#888;padding-top:3px;line-height:1.3}
.type-pill{display:inline-block;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:700;color:white;white-space:nowrap;flex-shrink:0}
.type-reel{background:#C03030}
.type-carousel{background:#2860B8}
.type-quote{background:#4a8a00}
.type-static{background:#C47820}
.type-other{background:#666}
.day-content{flex:1;min-width:0}
.day-meta{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap}
.day-pillar{font-size:10px;color:#aaa;font-style:italic}
.day-title{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:2px;line-height:1.35}
.day-hook{font-size:11px;color:#666;font-style:italic;margin-bottom:2px}
.day-purpose{font-size:10px;color:#4a8a00;font-weight:600}
.feedback-area{margin-top:8px}
.feedback-area textarea{width:100%;border:1.5px solid #e0e8d8;border-radius:8px;padding:10px 12px;font-size:12px;font-family:Arial,sans-serif;color:#1a1a1a;resize:vertical;min-height:70px;outline:none;transition:border-color .15s}
.feedback-area textarea:focus{border-color:#6BBF00}
.feedback-area textarea::placeholder{color:#bbb}
.cta-section{text-align:center;padding:28px 20px;background:#fff;border-radius:12px;margin-bottom:16px}
.cta-title{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.cta-sub{font-size:12px;color:#666;margin-bottom:20px;line-height:1.6}
.btn-approve{display:inline-block;background:#6BBF00;color:#1a1a1a;border:none;padding:14px 36px;border-radius:8px;font-size:14px;font-weight:900;cursor:pointer;font-family:Arial,sans-serif;letter-spacing:-0.3px;transition:background .15s}
.btn-approve:hover{background:#4a8a00;color:white}
.btn-changes{display:inline-block;background:transparent;color:#3D2A7A;border:1.5px solid #3D2A7A;padding:12px 28px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;transition:all .15s;margin-left:12px}
.btn-changes:hover{background:#3D2A7A;color:white}
.btns{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.changes-panel{display:none;margin-top:16px;text-align:left}
.changes-panel.show{display:block}
.changes-label{font-size:11px;font-weight:700;color:#3D2A7A;margin-bottom:8px;letter-spacing:0.5px}
.changes-input{width:100%;border:1.5px solid #d0c8e8;border-radius:8px;padding:12px 14px;font-size:13px;font-family:Arial,sans-serif;color:#1a1a1a;resize:vertical;min-height:100px;outline:none}
.changes-input:focus{border-color:#3D2A7A}
.btn-send-changes{background:#3D2A7A;color:white;border:none;padding:10px 24px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;margin-top:10px}
.loading{text-align:center;padding:60px 24px}
.spinner{width:36px;height:36px;border:3px solid #e8e5de;border-top-color:#6BBF00;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-label{font-size:13px;color:#888;font-weight:600}
.error-state{text-align:center;padding:60px 24px;background:#fff;border-radius:12px}
.error-icon{font-size:36px;margin-bottom:12px}
.error-title{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.error-sub{font-size:13px;color:#666;line-height:1.65}
.success-state{text-align:center;padding:60px 24px;background:#fff;border-radius:12px}
.success-icon{font-size:48px;margin-bottom:16px}
.success-title{font-size:20px;font-weight:900;color:#1a1a1a;margin-bottom:8px}
.success-sub{font-size:13px;color:#666;line-height:1.7;max-width:360px;margin:0 auto}
.already-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.already-approved{background:#e0f8e8;color:#1a6b3a}
.already-changes{background:#fff0e0;color:#8a4a00}
footer{text-align:center;font-size:10px;color:#aaa;padding:20px;margin-top:8px}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">YAH! <span>Your Audience, Handled.</span></div>
  <div style="font-size:11px;color:rgba(255,255,255,0.5)">Content Plan Review</div>
</div>

<div class="shell" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-label">Loading your content plan...</div>
  </div>
</div>

<script>
const SB_URL = 'https://piowmyefosrdpjisguii.supabase.co'
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpb3dteWVmb3NyZHBqaXNndWlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDcyNjksImV4cCI6MjA5MDMyMzI2OX0.aI0-esJB5IH-KwgsHx_FM_YpOp9k-0M0gc5xlfdJrcY'
const SB_H = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' }

async function sbGet(path) {
  const r = await fetch(SB_URL + '/rest/v1/' + path, { headers: SB_H })
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || 'DB error ' + r.status) }
  return r.json()
}
async function sbPatch(path, body) {
  const r = await fetch(SB_URL + '/rest/v1/' + path, { method: 'PATCH', headers: { ...SB_H, 'Prefer': 'return=minimal' }, body: JSON.stringify(body) })
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || 'PATCH error ' + r.status) }
}

function esc(str) { return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') }

function typeClass(type) {
  const t = (type || '').toLowerCase()
  if (t.includes('reel')) return 'type-reel'
  if (t.includes('carousel')) return 'type-carousel'
  if (t.includes('quote')) return 'type-quote'
  return 'type-other'
}

async function init() {
  const app = document.getElementById('app')
  const params = new URLSearchParams(window.location.search)
  const token = params.get('token')

  if (!token) {
    app.innerHTML = errorState('No approval token found', 'This link appears to be invalid or incomplete. Please contact your account manager for a new plan link.')
    return
  }

  try {
    // Fetch approval record by token
    const approvals = await sbGet('approvals?token=eq.' + token + '&select=*')
    if (!approvals.length) {
      app.innerHTML = errorState('Plan not found', 'This approval link may have expired or already been used. Contact your account manager.')
      return
    }
    const approval = approvals[0]

    // Check if already actioned
    if (approval.status === 'approved') {
      app.innerHTML = successState('Plan Already Approved', 'You already approved this plan. Your account manager has been notified and the team is in production.')
      return
    }

    // Fetch plan
    const plans = await sbGet('plans?id=eq.' + approval.plan_id + '&select=*')
    if (!plans.length) throw new Error('Plan not found')
    const plan = plans[0]

    // Fetch client
    const clients = await sbGet('clients?id=eq.' + plan.client_id + '&select=name,brand_name,client_email')
    const client = clients[0] || {}

    // Fetch plan days
    const days = await sbGet('plan_days?plan_id=eq.' + plan.plan_id_ref || plan.id + '&order=day_number.asc&select=*')

    // Render
    renderPlan(app, client, plan, days, approval, token)

  } catch (err) {
    app.innerHTML = errorState('Something went wrong', err.message || 'Unable to load the plan. Please try again or contact your account manager.')
  }
}

function renderPlan(app, client, plan, days, approval, token) {
  const week1 = days.slice(0, 7)
  const week2 = days.slice(7, 14)

  const renderDays = (dayList) => dayList.map(day => `
    <div class="day-row">
      <div class="day-col">${esc(day.day_label || 'Day ' + day.day_number)}</div>
      <div class="day-content">
        <div class="day-meta">
          <span class="type-pill ${typeClass(day.post_type)}">${esc(day.post_type || '')}</span>
          <span class="day-pillar">${esc(day.pillar || '')}</span>
        </div>
        <div class="day-title">${esc(day.title || '')}</div>
        ${day.hook ? `<div class="day-hook">"${esc(day.hook)}"</div>` : ''}
        ${day.brand_purpose ? `<div class="day-purpose">${esc(day.brand_purpose)}</div>` : ''}
      </div>
    </div>
  `).join('')

  app.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="card-eyebrow">Content Plan for Review</div>
        <div class="card-title">${esc(plan.week_of || '2-Week Content Plan')} &mdash; ${esc(client.brand_name || client.name || '')}</div>
      </div>
      <div class="card-body">
        <p class="greeting">Hi ${esc(client.name || 'there')}, your content plan is ready for review. Please look through each post and approve or send feedback below.</p>
        ${plan.planning_note ? `<div class="planning-note">Strategic direction: ${esc(plan.planning_note)}</div>` : ''}
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="week-label wl-1">Week 1</div>
        ${renderDays(week1)}
        <div class="week-label wl-2" style="margin-top:16px">Week 2</div>
        ${renderDays(week2)}
      </div>
    </div>

    <div class="cta-section" id="cta-section">
      <div class="cta-title">Ready to move forward?</div>
      <div class="cta-sub">If the plan looks good, hit Approve. If you'd like changes, click Request Changes and leave a note.</div>
      <div class="btns">
        <button class="btn-approve" onclick="doApprove('${token}', '${plan.id}')">Approve Plan ✓</button>
        <button class="btn-changes" onclick="toggleChanges()">Request Changes</button>
      </div>
      <div class="changes-panel" id="changes-panel">
        <div class="changes-label">WHAT WOULD YOU LIKE CHANGED?</div>
        <textarea class="changes-input" id="changes-input" placeholder="e.g. Day 3 title feels off — can we try something more personal? The Thursday carousel topic should relate to last week's video about..."></textarea>
        <br>
        <button class="btn-send-changes" onclick="doRequestChanges('${token}', '${plan.id}')">Send Feedback</button>
      </div>
    </div>

    <footer>YAH! by EBEPR Studios &bull; Your Audience, Handled.</footer>
  `
}

function toggleChanges() {
  const p = document.getElementById('changes-panel')
  p.classList.toggle('show')
}

async function doApprove(token, planId) {
  const btn = document.querySelector('.btn-approve')
  btn.textContent = 'Approving...'
  btn.disabled = true

  try {
    await sbPatch('approvals?token=eq.' + token, {
      status: 'approved',
      responded_at: new Date().toISOString()
    })
    await sbPatch('plans?id=eq.' + planId, {
      status: 'approved',
      approved_at: new Date().toISOString()
    })
    document.getElementById('cta-section').outerHTML = successState('Plan Approved!', 'Your account manager has been notified. The team will now begin production. You\'ll hear from us with scheduling details soon.')
  } catch (err) {
    btn.textContent = 'Approve Plan ✓'
    btn.disabled = false
    alert('Something went wrong: ' + err.message)
  }
}

async function doRequestChanges(token, planId) {
  const notes = document.getElementById('changes-input').value.trim()
  if (!notes) { alert('Please describe the changes you\'d like before sending.'); return }

  const btn = document.querySelector('.btn-send-changes')
  btn.textContent = 'Sending...'
  btn.disabled = true

  try {
    await sbPatch('approvals?token=eq.' + token, {
      status: 'changes_requested',
      feedback_notes: notes,
      responded_at: new Date().toISOString()
    })
    await sbPatch('plans?id=eq.' + planId, {
      status: 'changes_requested'
    })
    document.getElementById('cta-section').outerHTML = `
      <div class="success-state">
        <div class="success-icon">📝</div>
        <div class="success-title">Feedback Sent</div>
        <p class="success-sub">Your account manager has been notified and will revise the plan based on your feedback. You'll receive an updated version shortly.</p>
      </div>`
  } catch (err) {
    btn.textContent = 'Send Feedback'
    btn.disabled = false
    alert('Something went wrong: ' + err.message)
  }
}

function errorState(title, sub) {
  return `<div class="error-state"><div class="error-icon">⚠️</div><div class="error-title">${esc(title)}</div><p class="error-sub">${esc(sub)}</p></div>`
}
function successState(title, sub) {
  return `<div class="success-state"><div class="success-icon">✅</div><div class="success-title">${esc(title)}</div><p class="success-sub">${esc(sub)}</p></div>`
}

init()
</script>
</body>
</html>
